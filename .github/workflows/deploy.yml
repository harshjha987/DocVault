name: Deploy to EC2

  on:
    push:
      branches:
        - main  # runs every time you push to main branch

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        # Step 1 — checkout your code
        - name: Checkout code
          uses: actions/checkout@v3

        # Step 2 — setup Java 21
        - name: Set up Java 21
          uses: actions/setup-java@v3
          with:
            java-version: '21'
            distribution: 'corretto'

        # Step 3 — build JAR
        - name: Build JAR
          run: mvn clean package -DskipTests

        # Step 4 — upload JAR to EC2
        - name: Upload JAR to EC2
          uses: appleboy/scp-action@master
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_KEY }}
            source: "target/File-Upload-System-0.0.1-SNAPSHOT.jar"
            target: "~/"

        # Step 5 — restart app on EC2
        - name: Restart app on EC2
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_KEY }}
            script: |
              mv ~/target/File-Upload-System-0.0.1-SNAPSHOT.jar ~/app.jar
              pkill -f "java -jar" || true
              export DB_USERNAME=${{ secrets.DB_USERNAME }}
              export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              export JWT_SECRET=${{ secrets.JWT_SECRET }}
              export AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
              export AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
              export AWS_REGION=${{ secrets.AWS_REGION }}
              export AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
              nohup java -jar ~/app.jar > ~/app.log 2>&1 &